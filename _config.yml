title: "Hugo NGUYEN"
description: "Academic profile, publications, and notes."
url: "https://hugo-ngn.github.io"
baseurl: ""

markdown: kramdown
kramdown:
  input: GFM
  math_engine: mathjax
  syntax_highlighter: rouge

permalink: /:categories/:title/

collections:
  notes:
    output: true
    permalink: /notes/:path/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: default
  - scope:
      path: ""
      type: notes
    values:
      layout: default

include:
  - cv.html
  - publications.html
  - index.html

exclude:
  - prompt.md
  - notes/
  - vendor/
  - Gemfile.lock
  - README.md
